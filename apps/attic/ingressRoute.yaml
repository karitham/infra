apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: attic
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`nix-cache.karitham.dev`)
      services:
        - name: attic
          port: 80
          serversTransport: long-upload
  tls:
    secretName: attic-tls
