apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: mc-geyser
  name: mc-geyser
spec:
  replicas: 1
  serviceName: mc-geyser
  selector:
    matchLabels:
      app: mc-geyser
  template:
    metadata:
      labels:
        app: mc-geyser
    spec:
      containers:
        - name: mc
          image: itzg/minecraft-server:java25
          env:
            - name: EULA
              value: "TRUE"
            - name: TYPE
              value: PURPUR
            - name: VERSION
              value: "26.1.2"
            - name: MC_PORT
              value: "25565"
            - name: INIT_MEMORY
              value: 2G
            - name: MAX_MEMORY
              value: 6G
            - name: PLUGINS
              value: |
                https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
                https://download.geysermc.org/v2/projects/floodgate/versions/latest/builds/latest/downloads/spigot
          volumeMounts:
            - mountPath: /data
              name: data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
