apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: skyhook
  namespace: flux-system
spec:
  interval: 1h
  url: https://skyhook-io.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
  namespace: radar
spec:
  interval: 5m
  targetNamespace: radar
  chart:
    spec:
      chart: radar
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: skyhook
        namespace: flux-system
  values:
    ingress:
      enabled: false
